<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin Bloom 人口普查 🌱</title>
    <style>
        :root {
            --red: #ff6b6b;
            --yellow: #ffd93d;
            --blue: #4dabf7;
            --purple: #cc5de8;
            --white: #f8f9fa;
            --rock: #868e96;
            --winged: #f783ac;
            --ice: #66d9e8;
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #4ade80;
            --text: #f1f5f9;
            --muted: #64748b;
            --border: rgba(255,255,255,0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
        
        .app { max-width: 1000px; margin: 0 auto; padding: 15px; }
        
        /* 顶栏 */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg); padding: 12px 0;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 15px; flex-wrap: wrap;
        }
        .logo { font-size: 1.4rem; font-weight: 700; }
        .stats { display: flex; gap: 15px; margin-left: auto; align-items: center; }
        .stat-box { text-align: center; }
        .stat-num { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
        .stat-lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
        
        /* 工具栏 */
        .toolbar { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
        .search { flex:1; min-width:150px; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:0.9rem; }
        .search:focus { outline:none; border-color:var(--accent); }
        .btn { padding:10px 16px; border:none; border-radius:8px; font-size:0.85rem; font-weight:600; cursor:pointer; background:var(--card); color:var(--text); border:1px solid var(--border); }
        .btn:hover { border-color:var(--accent); }
        .btn.active { background:var(--accent); color:var(--bg); border-color:var(--accent); }
        
        /* 视图切换 */
        .views { display: flex; gap: 8px; margin-bottom: 15px; }
        .view-btn { padding: 10px 20px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-weight: 600; cursor: pointer; }
        .view-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        
        /* 缺失视图 */
        .missing-view { display: none; }
        .missing-view.active { display: block; }
        .missing-section { margin-bottom: 20px; }
        .missing-title { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .missing-title h3 { font-size: 1rem; }
        .missing-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .missing-chip {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px; border-radius: 20px;
            background: var(--card); border: 1px solid var(--border);
            cursor: pointer; font-size: 0.85rem;
            transition: all 0.15s;
        }
        .missing-chip:hover { border-color: var(--accent); transform: scale(1.02); }
        .missing-chip .dot { width: 14px; height: 14px; border-radius: 50%; }
        .missing-chip.owned { opacity: 0.3; text-decoration: line-through; }
        
        /* 列表视图 */
        .list-view { display: none; }
        .list-view.active { display: block; }
        
        .decor-item {
            background: var(--card); border-radius: 10px; padding: 12px 16px;
            margin-bottom: 8px; border: 1px solid var(--border);
        }
        .decor-item.complete { border-color: var(--accent); background: rgba(74,222,128,0.05); }
        .decor-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .decor-icon { font-size: 1.4rem; }
        .decor-name { font-weight: 600; }
        .decor-progress { margin-left: auto; color: var(--accent); font-weight: 600; font-size: 0.9rem; }
        .decor-btns { display: flex; gap: 6px; margin-left: 10px; }
        .decor-btns button { padding: 4px 10px; font-size: 0.75rem; border-radius: 4px; background: rgba(0,0,0,0.3); color: var(--muted); border: none; cursor: pointer; }
        .decor-btns button:hover { color: var(--accent); }
        
        .pikmin-grid { display: flex; gap: 6px; flex-wrap: wrap; }
        .pik {
            width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.2); border: 2px solid transparent;
            cursor: pointer; position: relative; transition: all 0.1s;
        }
        .pik:hover { transform: scale(1.1); }
        .pik.owned { border-color: var(--accent); box-shadow: 0 0 10px rgba(74,222,128,0.3); }
        .pik.owned::after {
            content: '✓'; position: absolute; top: -5px; right: -5px;
            width: 14px; height: 14px; background: var(--accent);
            border-radius: 50%; font-size: 0.55rem; color: var(--bg);
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .pik.na { opacity: 0.15; cursor: default; }
        .pik .dot { width: 20px; height: 20px; border-radius: 50%; }
        
        .dot.red { background: var(--red); }
        .dot.yellow { background: var(--yellow); }
        .dot.blue { background: var(--blue); }
        .dot.purple { background: var(--purple); }
        .dot.white { background: var(--white); }
        .dot.rock { background: var(--rock); }
        .dot.winged { background: var(--winged); }
        .dot.ice { background: var(--ice); }
        
        /* 筛选栏 */
        .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
        .filter-chip {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 12px; border-radius: 15px;
            background: var(--card); border: 1px solid var(--border);
            font-size: 0.8rem; cursor: pointer;
        }
        .filter-chip:hover { border-color: var(--muted); }
        .filter-chip.active { border-color: var(--accent); color: var(--accent); }
        .filter-chip .fdot { width: 10px; height: 10px; border-radius: 50%; }
        
        .spacer { flex: 1; }
        
        /* 分类 */
        .cat-header {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 0; cursor: pointer; border-bottom: 1px solid var(--border);
            margin-top: 15px;
        }
        .cat-header h3 { font-size: 0.95rem; color: var(--muted); }
        .cat-header .arrow { transition: transform 0.2s; }
        .cat-header.closed .arrow { transform: rotate(-90deg); }
        .cat-content { padding-top: 8px; }
        .cat-content.hidden { display: none; }
        .cat-count { margin-left: auto; font-size: 0.85rem; color: var(--accent); }
        
        /* Modal */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; }
        .modal.show { display: flex; }
        .modal-box { background:var(--card); padding:25px; border-radius:16px; max-width:400px; width:90%; }
        .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
        .modal-head h2 { font-size:1.1rem; }
        .modal-close { background:none; border:none; color:var(--muted); font-size:1.5rem; cursor:pointer; }
        .drop-zone { border:2px dashed var(--border); border-radius:10px; padding:40px; text-align:center; cursor:pointer; }
        .drop-zone:hover { border-color:var(--accent); }
        .drop-zone input { display:none; }
        
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--accent); color:var(--bg); padding:12px 24px; border-radius:20px; font-weight:600; transition:transform 0.3s; z-index:1001; }
        .toast.show { transform:translateX(-50%) translateY(0); }
        
        .empty { text-align:center; padding:40px; color:var(--muted); }
    </style>
</head>
<body>
<div class="app">
    <div class="topbar">
        <div class="logo">🌱 Pikmin 普查</div>
        <div class="stats">
            <div class="stat-box"><div class="stat-num" id="s-owned">0</div><div class="stat-lbl">已有</div></div>
            <div class="stat-box"><div class="stat-num" id="s-missing">0</div><div class="stat-lbl">缺少</div></div>
            <div class="stat-box"><div class="stat-num" id="s-pct">0%</div><div class="stat-lbl">完成</div></div>
        </div>
    </div>
    
    <div class="toolbar">
        <input class="search" placeholder="🔍 搜索..." id="search">
        <button class="btn" id="btn-import">📥 导入</button>
        <button class="btn" id="btn-export">📤 导出</button>
        <button class="btn" id="btn-reset">🔄 重置</button>
    </div>
    
    <div class="views">
        <button class="view-btn active" data-view="missing">📋 缺失清单</button>
        <button class="view-btn" data-view="list">📝 完整列表</button>
    </div>
    
    <div class="filters" id="filters"></div>
    
    <div id="missing-view" class="missing-view active"></div>
    <div id="list-view" class="list-view"></div>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <div class="modal-head">
            <h2>📥 导入数据</h2>
            <button class="modal-close" id="modal-close">×</button>
        </div>
        <div class="drop-zone" id="drop-zone">
            <p style="font-size:2rem">📁</p>
            <p>点击或拖拽 JSON 文件</p>
            <input type="file" id="file-input" accept=".json">
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = ['red','yellow','blue','purple','white','rock','winged','ice'];
const NAMES = {red:'红',yellow:'黄',blue:'蓝',purple:'紫',white:'白',rock:'岩',winged:'飞',ice:'冰'};
const ALL7 = ['red','yellow','blue','purple','white','rock','winged'];
const ALL8 = COLORS;

const DATA = {
    "常规地点": [
        {id:'roadside_sticker',name:'路边(贴纸)',icon:'🛣️',t:ALL8},
        {id:'roadside_coin',name:'路边(硬币)',icon:'🪙',t:ALL8},
        {id:'restaurant',name:'餐厅',icon:'🍽️',t:ALL8},
        {id:'cafe',name:'咖啡馆',icon:'☕',t:ALL7},
        {id:'sweetshop',name:'甜品店',icon:'🍰',t:ALL7},
        {id:'movie',name:'电影院',icon:'🎬',t:ALL7},
        {id:'pharmacy',name:'药房',icon:'💊',t:ALL7},
        {id:'zoo',name:'动物园',icon:'🦁',t:ALL7},
        {id:'forest',name:'森林',icon:'🌲',t:ALL8},
        {id:'waterside',name:'水边',icon:'🌊',t:ALL7},
        {id:'postoffice',name:'邮局',icon:'📮',t:ALL7},
        {id:'artgallery',name:'美术馆',icon:'🎨',t:ALL7},
        {id:'airport',name:'机场',icon:'✈️',t:ALL7},
        {id:'station',name:'车站',icon:'🚉',t:ALL7},
        {id:'beach',name:'海滩',icon:'🏖️',t:ALL7},
        {id:'burger',name:'汉堡店',icon:'🍔',t:ALL7},
        {id:'convenience',name:'便利店',icon:'🏪',t:ALL7},
        {id:'supermarket',name:'超市',icon:'🛒',t:ALL7},
        {id:'bakery',name:'面包店',icon:'🥐',t:ALL7},
        {id:'hairsalon',name:'发廊',icon:'💇',t:ALL7},
        {id:'clothes',name:'服装店',icon:'👗',t:ALL7},
        {id:'park3',name:'公园(三叶草)',icon:'☘️',t:ALL7},
        {id:'park4',name:'公园(四叶草)',icon:'🍀',t:ALL7},
        {id:'library',name:'图书馆',icon:'📚',t:ALL7},
        {id:'stadium',name:'体育场',icon:'🏟️',t:ALL7},
        {id:'mountain',name:'山',icon:'⛰️',t:ALL7},
        {id:'hotel',name:'酒店',icon:'🏨',t:ALL7},
        {id:'temple',name:'寺庙/神社',icon:'⛩️',t:ALL7},
    ],
    "餐厅类型": [
        {id:'italian',name:'意大利餐厅',icon:'🍝',t:ALL7},
        {id:'ramen',name:'拉面店',icon:'🍜',t:ALL7},
        {id:'sushi',name:'寿司店',icon:'🍣',t:ALL7},
    ],
    "特殊地点": [
        {id:'themepark',name:'主题公园',icon:'🎢',t:['red','yellow','blue']},
        {id:'appliance',name:'电器店',icon:'📺',t:['yellow']},
        {id:'university',name:'大学',icon:'🎓',t:['red','yellow','blue']},
    ],
    "天气": [
        {id:'rainy',name:'雨天',icon:'🌧️',t:ALL8},
        {id:'snowy',name:'雪天',icon:'❄️',t:ALL8},
    ],
    "活动限定": [
        {id:'lunar',name:'农历新年',icon:'🧧',t:ALL7},
        {id:'chess',name:'国际象棋',icon:'♟️',t:ALL7},
        {id:'hanafuda',name:'花札',icon:'🎴',t:ALL7},
        {id:'mahjong',name:'麻将',icon:'🀄',t:ALL8},
        {id:'kopparite',name:'Kopparite',icon:'💎',t:ALL7},
        {id:'fingerboard',name:'滑板',icon:'🛹',t:ALL7},
        {id:'mitten',name:'手套',icon:'🧤',t:ALL7},
        {id:'present',name:'礼物',icon:'🎁',t:ALL7},
        {id:'spring',name:'春季',icon:'🌸',t:ALL7},
        {id:'summer',name:'夏季',icon:'🌻',t:ALL7},
        {id:'autumn',name:'秋季',icon:'🍂',t:ALL7},
        {id:'halloween',name:'万圣节',icon:'🎃',t:ALL7},
        {id:'winter',name:'冬季',icon:'⛄',t:ALL7},
    ]
};

let owned = {};
let view = 'missing';
let colorFilter = 'all';
let statusFilter = 'all';
let searchQ = '';
let collapsed = {};

function key(d,c){ return d+'_'+c; }
function load(){ 
    const s = localStorage.getItem('pik_v4'); 
    owned = s ? JSON.parse(s) : {}; 
}
function save(){ localStorage.setItem('pik_v4', JSON.stringify(owned)); }

function toggle(did, color){
    const k = key(did,color);
    owned[k] = !owned[k];
    if(!owned[k]) delete owned[k];
    save();
    render();
}

function fillDecor(did, types){
    types.forEach(c => owned[key(did,c)] = true);
    save(); render();
    toast('✅ 已全选');
}

function clearDecor(did, types){
    types.forEach(c => delete owned[key(did,c)]);
    save(); render();
    toast('🗑️ 已清空');
}

function getAllDecors(){
    const list = [];
    for(const [cat, items] of Object.entries(DATA)){
        items.forEach(d => list.push({...d, cat}));
    }
    return list;
}

function getStats(){
    let o=0, m=0;
    getAllDecors().forEach(d => {
        d.t.forEach(c => {
            if(owned[key(d.id,c)]) o++; else m++;
        });
    });
    return {owned:o, missing:m, total:o+m, pct: o+m>0 ? (o/(o+m)*100).toFixed(1) : 0};
}

function getColorStats(){
    const stats = {};
    COLORS.forEach(c => stats[c] = {o:0,m:0});
    getAllDecors().forEach(d => {
        d.t.forEach(c => {
            if(owned[key(d.id,c)]) stats[c].o++; else stats[c].m++;
        });
    });
    return stats;
}

function renderFilters(){
    const cs = getColorStats();
    let h = `<div class="filter-chip ${colorFilter==='all'?'active':''}" onclick="setColor('all')">全部</div>`;
    COLORS.forEach(c => {
        h += `<div class="filter-chip ${colorFilter===c?'active':''}" onclick="setColor('${c}')">
            <div class="fdot dot ${c}"></div>${cs[c].m}缺
        </div>`;
    });
    h += `<div class="spacer"></div>`;
    h += `<div class="filter-chip ${statusFilter==='all'?'active':''}" onclick="setStatus('all')">全部</div>`;
    h += `<div class="filter-chip ${statusFilter==='missing'?'active':''}" onclick="setStatus('missing')">未完成</div>`;
    h += `<div class="filter-chip ${statusFilter==='complete'?'active':''}" onclick="setStatus('complete')">已完成</div>`;
    $('#filters').innerHTML = h;
}

function setColor(c){ colorFilter = c; render(); }
function setStatus(s){ statusFilter = s; render(); }

function filterDecor(d){
    if(searchQ && !d.name.includes(searchQ) && !d.icon.includes(searchQ)) return false;
    if(colorFilter !== 'all' && !d.t.includes(colorFilter)) return false;
    const cnt = d.t.filter(c => owned[key(d.id,c)]).length;
    if(statusFilter === 'complete' && cnt !== d.t.length) return false;
    if(statusFilter === 'missing' && cnt === d.t.length) return false;
    return true;
}

function renderMissing(){
    const container = $('#missing-view');
    let h = '';
    
    // 按颜色分组显示缺失
    COLORS.forEach(color => {
        if(colorFilter !== 'all' && colorFilter !== color) return;
        
        const missing = [];
        getAllDecors().forEach(d => {
            if(!d.t.includes(color)) return;
            if(searchQ && !d.name.includes(searchQ)) return;
            if(!owned[key(d.id, color)]){
                missing.push(d);
            }
        });
        
        if(statusFilter === 'complete') return;
        if(missing.length === 0 && statusFilter !== 'all') return;
        
        h += `<div class="missing-section">
            <div class="missing-title">
                <div class="dot ${color}" style="width:18px;height:18px"></div>
                <h3>${NAMES[color]} Pikmin</h3>
                <span style="color:var(--muted);font-size:0.85rem">缺 ${missing.length} 个</span>
            </div>
            <div class="missing-grid">`;
        
        if(missing.length === 0){
            h += `<span style="color:var(--accent)">✨ 全部收集完成！</span>`;
        } else {
            missing.forEach(d => {
                h += `<div class="missing-chip" onclick="toggle('${d.id}','${color}')">
                    ${d.icon} ${d.name}
                </div>`;
            });
        }
        h += `</div></div>`;
    });
    
    if(!h) h = '<div class="empty">没有匹配项</div>';
    container.innerHTML = h;
}

function renderList(){
    const container = $('#list-view');
    let h = '';
    
    for(const [cat, items] of Object.entries(DATA)){
        const filtered = items.filter(filterDecor);
        if(filtered.length === 0) continue;
        
        const catOwned = filtered.reduce((s,d) => s + d.t.filter(c=>owned[key(d.id,c)]).length, 0);
        const catTotal = filtered.reduce((s,d) => s + d.t.length, 0);
        const isClosed = collapsed[cat];
        
        h += `<div class="cat-header ${isClosed?'closed':''}" onclick="toggleCat('${cat}')">
            <span class="arrow">▼</span>
            <h3>${cat}</h3>
            <span class="cat-count">${catOwned}/${catTotal}</span>
        </div>
        <div class="cat-content ${isClosed?'hidden':''}">`;
        
        filtered.forEach(d => {
            const cnt = d.t.filter(c => owned[key(d.id,c)]).length;
            const done = cnt === d.t.length;
            h += `<div class="decor-item ${done?'complete':''}">
                <div class="decor-header">
                    <span class="decor-icon">${d.icon}</span>
                    <span class="decor-name">${d.name}</span>
                    <span class="decor-progress">${cnt}/${d.t.length}</span>
                    <div class="decor-btns">
                        <button onclick="fillDecor('${d.id}',${JSON.stringify(d.t).replace(/"/g,"'")})">全选</button>
                        <button onclick="clearDecor('${d.id}',${JSON.stringify(d.t).replace(/"/g,"'")})">清空</button>
                    </div>
                </div>
                <div class="pikmin-grid">
                    ${COLORS.map(c => {
                        const avail = d.t.includes(c);
                        const has = avail && owned[key(d.id,c)];
                        return `<div class="pik ${has?'owned':''} ${!avail?'na':''}" 
                            ${avail ? `onclick="toggle('${d.id}','${c}')"` : ''} title="${NAMES[c]}">
                            <div class="dot ${c}"></div>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
        });
        h += '</div>';
    }
    
    if(!h) h = '<div class="empty">没有匹配项</div>';
    container.innerHTML = h;
}

function toggleCat(cat){
    collapsed[cat] = !collapsed[cat];
    render();
}

function render(){
    const st = getStats();
    $('#s-owned').textContent = st.owned;
    $('#s-missing').textContent = st.missing;
    $('#s-pct').textContent = st.pct + '%';
    renderFilters();
    renderMissing();
    renderList();
}

function setView(v){
    view = v;
    $$('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
    $('#missing-view').classList.toggle('active', v === 'missing');
    $('#list-view').classList.toggle('active', v === 'list');
}

function exportData(){
    const data = {v:4, date:new Date().toISOString(), data:owned};
    const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'pikmin_'+new Date().toISOString().slice(0,10)+'.json';
    a.click();
    toast('📤 已导出');
}

function importFile(file){
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const j = JSON.parse(e.target.result);
            owned = j.data || j.collection || j;
            save(); render();
            $('#modal').classList.remove('show');
            toast('📥 导入成功');
        } catch(e){ toast('❌ 格式错误'); }
    };
    reader.readAsText(file);
}

function toast(msg){
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

function $(s){ return document.querySelector(s); }
function $$(s){ return document.querySelectorAll(s); }

// 事件绑定
$('#search').oninput = e => { searchQ = e.target.value; render(); };
$('#btn-export').onclick = exportData;
$('#btn-import').onclick = () => $('#modal').classList.add('show');
$('#modal-close').onclick = () => $('#modal').classList.remove('show');
$('#btn-reset').onclick = () => { if(confirm('确定重置？')){ owned={}; save(); render(); toast('🔄 已重置'); }};

$$('.view-btn').forEach(b => b.onclick = () => setView(b.dataset.view));

const dz = $('#drop-zone');
const fi = $('#file-input');
dz.onclick = () => fi.click();
fi.onchange = e => e.target.files[0] && importFile(e.target.files[0]);
dz.ondragover = e => { e.preventDefault(); dz.style.borderColor = 'var(--accent)'; };
dz.ondragleave = () => dz.style.borderColor = '';
dz.ondrop = e => { e.preventDefault(); dz.style.borderColor = ''; e.dataTransfer.files[0] && importFile(e.dataTransfer.files[0]); };

document.onkeydown = e => { if(e.key === 'Escape') $('#modal').classList.remove('show'); };

// 初始化
load();
render();
</script>
</body>
</html>
