<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>皮口普查</title>
    <meta name="description" content="追蹤你的 Pikmin Bloom Decor 收集進度">
    <meta name="theme-color" content="#5cb860">
    <link rel="icon" href="https://lh3.googleusercontent.com/U5Jp2yTMY_iiDlObsDYWeTZDjeEpBynvXiSFYJQO5hIJXAddeXbpSwaw2eE4RHB4ZBqa7NXrrVcyLcCWCFwaKoX42qKYO_JOg1oIFl-loDHZ5zQ=e365-pa-nu-w200">
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/U5Jp2yTMY_iiDlObsDYWeTZDjeEpBynvXiSFYJQO5hIJXAddeXbpSwaw2eE4RHB4ZBqa7NXrrVcyLcCWCFwaKoX42qKYO_JOg1oIFl-loDHZ5zQ=e365-pa-nu-w200">
    <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22%E7%9A%AE%E5%8F%A3%E6%99%AE%E6%9F%A5%22%2C%22short_name%22%3A%22%E7%9A%AE%E5%8F%A3%E6%99%AE%E6%9F%A5%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%235cb860%22%2C%22theme_color%22%3A%22%235cb860%22%7D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="皮口普查">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --red:#e53935; --yellow:#fdd835; --blue:#1e88e5; --purple:#8e24aa;
            --white:#e0e0e0; --rock:#616161; --winged:#ec407a; --ice:#26c6da;
            --bg:#f9fdf9; --card:#ffffff; --accent:#5cb860; --accent2:#81c784; --text:#222; --muted:#777;
            --shadow:0 2px 8px rgba(0,0,0,.05);
            --soft-border:#e7ece7;
            --tile-bg:#f3f5f3;
            --tile-bg-own:#dff4e1;
            --tile-shadow-own:0 0 0 2px var(--accent), 0 4px 10px rgba(92,184,96,.14);
            --pik-size:38px;
            --pik-gap:8px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html{background:#5cb860}
        body{font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        body.standalone-mode{background:linear-gradient(#5cb860 0 calc(env(safe-area-inset-top, 0px) + 12px), var(--bg) calc(env(safe-area-inset-top, 0px) + 12px))}
        body.modal-open{overflow:hidden;touch-action:none}
        .app{max-width:1100px;margin:0 auto;padding:12px;padding-bottom:120px}
        
        .header{position:sticky;top:0;z-index:100;background:#5cb860;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));border-radius:0 0 16px 16px;box-shadow:0 2px 10px rgba(92,184,96,.25)}
        .header-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
        .logo{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:4px;color:#fff}
        .logo-img{height:26px}
        .stats{display:flex;gap:12px;margin-left:auto}
        .stat{text-align:center;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .15s}
        .stat:hover{background:rgba(255,255,255,.15)}
        .stat b{color:#fff;font-size:1.2rem;font-weight:800}
        .stat small{display:block;font-size:.7rem;color:rgba(255,255,255,.8)}
        
        .progress-ring{position:relative;flex-shrink:0;margin-top:4px}
        .progress-ring svg{display:block;width:42px;height:42px;transform:rotate(-90deg)}
        .progress-ring circle{fill:none;stroke-width:3}
        .progress-ring .bg{stroke:rgba(255,255,255,.3)}
        .progress-ring .fg{stroke:#fff;stroke-linecap:round;transition:stroke-dashoffset .5s ease}
        .progress-ring span{position:absolute;top:0;left:0;width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
        
        .toolbar{position:sticky;top:78px;z-index:150;display:flex;gap:8px;margin:10px 0;flex-wrap:wrap;align-items:center;padding:8px 10px;border-radius:16px;background:rgba(249,253,249,.96);backdrop-filter:blur(10px);box-shadow:0 4px 18px rgba(0,0,0,.08)}
        .search-wrap{position:relative;flex:1;min-width:140px}
        .search{width:100%;padding:10px 40px 10px 14px;border-radius:12px;border:2px solid #e0e0e0;background:rgba(255,255,255,.96);color:var(--text);font-size:16px;box-shadow:var(--shadow)}
        .search:focus{outline:none;border-color:var(--accent)}
        .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:24px;height:24px;border:none;border-radius:50%;background:transparent;color:#8d8d8d;font-size:16px;line-height:1;display:none;align-items:center;justify-content:center;cursor:pointer}
        .search-wrap.has-value .search-clear{display:flex}
        .btn{padding:10px 14px;border:none;border-radius:12px;font-size:.85rem;font-weight:700;cursor:pointer;background:var(--card);color:var(--text);border:2px solid #e0e0e0;transition:all .15s;box-shadow:var(--shadow)}
        .btn:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(10,148,116,.15)}
        .btn:active{transform:translateY(0)}
        .btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
        .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
        
        .event-section{background:var(--card);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
        .event-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;padding:4px 0}
        .event-section:has(.event-selected:empty) .event-header{margin-bottom:0}
        .event-header-left{display:flex;align-items:center;gap:6px}
        .event-header h3{font-size:.9rem;color:var(--muted)}
        .event-header .arr{transition:transform .2s;font-size:.8rem}
        .event-header.shut .arr{transform:rotate(-90deg)}
        .event-header.shut + .event-grid{display:none}
        .event-hint{font-size:.75rem;color:var(--muted)}
        .event-note{width:100%;font-size:.72rem;color:var(--muted);margin:2px 0 6px;font-style:italic}
        .event-grid{display:flex;flex-wrap:wrap;gap:6px;max-height:280px;overflow-y:auto;padding:4px 0}
        .event-chip{padding:5px 10px;border-radius:16px;background:#f0f0f0;font-size:.75rem;cursor:pointer;transition:all .15s}
        .event-chip:hover{background:#e0e0e0}
        .event-chip.on{background:var(--accent);color:#fff}
        
        .event-selected{margin-top:10px;padding-top:10px;border-top:1px dashed #ddd;display:none}
        .event-selected:empty{display:none}
        .event-selected-wrap{position:relative}
        .event-selected-list{display:flex;flex-wrap:wrap;gap:4px;max-height:96px;overflow-y:auto;padding-bottom:3px}
        .scroll-progress{position:relative;height:3px;background:rgba(92,184,96,.12);border-radius:2px;margin-top:4px}
        .scroll-progress-bar{height:100%;background:rgba(92,184,96,.72);border-radius:2px;transition:width .12s ease}
        .event-tag{display:inline-flex;align-items:center;max-width:100%;padding:2px 6px;border-radius:10px;background:#e8f5e9;color:var(--accent);font-size:.7rem;cursor:pointer;transition:all .15s;border:1px solid var(--accent2);white-space:nowrap;overflow:hidden}
        .event-tag .x{margin-left:3px;opacity:.6}
        
        .filters{margin-bottom:8px}
        .filter-grp{display:flex;align-items:center;background:var(--card);padding:4px 8px;border-radius:12px;box-shadow:var(--shadow);justify-content:space-between}
        .f-chip{display:flex;align-items:center;gap:2px;padding:4px 6px;border-radius:6px;font-size:.7rem;cursor:pointer;transition:all .15s;color:var(--muted)}
        .f-chip:hover{background:#f0f0f0}
        .f-chip.on{background:var(--accent);color:#fff}
        .f-chip .cdot{width:10px;height:10px;border-radius:50%}
        .f-sep{width:1px;height:16px;background:#ddd;margin:0 2px}
        .dot{width:14px;height:14px;border-radius:50%;border:1px solid rgba(0,0,0,.1)}
        .dot.red{background:var(--red)}.dot.yellow{background:var(--yellow)}.dot.blue{background:var(--blue)}
        .dot.purple{background:var(--purple)}.dot.white{background:var(--white)}.dot.rock{background:var(--rock)}
        .dot.winged{background:var(--winged)}.dot.ice{background:var(--ice)}
        
        
        .views{display:flex;gap:0;margin-bottom:12px;background:var(--card);border-radius:16px;padding:4px;box-shadow:var(--shadow)}
        .view-btn{flex:1;padding:10px 16px;border-radius:12px;background:transparent;border:none;color:var(--muted);font-weight:700;cursor:pointer;font-size:.85rem;transition:all .15s;text-align:center}
        .view-btn:hover{color:var(--text)}
        .view-btn.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(10,148,116,.3)}
        
        .cat{margin-top:12px}
        .cat-head{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1);cursor:pointer;user-select:none}
        .cat-head h3{font-size:.9rem;color:var(--muted)}
        .cat-head .arr{transition:transform .2s}
        .cat-head.shut .arr{transform:rotate(-90deg)}
        .cat-cnt{margin-left:auto;font-size:.8rem;color:var(--accent)}
        .cat-body{padding-top:6px}
        .cat-body.hide{display:none}
        
        .item{background:var(--card);border-radius:16px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);transition:all .15s;display:flex;flex-direction:column}
        .item:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
        .item.done{border:2px solid var(--accent2);background:#f0fff0}
        .item.done .item-name::after{content:' ✓';color:var(--accent)}
        .item-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;min-width:0}
        .item-icon{font-size:1.2rem}
        .item-info{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
        .item-name{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .item-sub{font-size:.75rem;color:var(--muted)}
        .item-prog{color:var(--accent);font-weight:700;font-size:.78rem;white-space:nowrap;padding:2px 6px;border-radius:999px;background:rgba(92,184,96,.10)}
        .item-btns{display:flex;gap:4px;align-items:center}
        .clear-btn{display:inline-flex;align-items:center;justify-content:center;padding:5px 0;font-size:.68rem;font-weight:700;border-radius:8px;background:#f6f6f6;color:#666;cursor:pointer;user-select:none;width:var(--pik-size);box-sizing:border-box;text-align:center;border:1px solid #dddddd;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:background .15s,border-color .15s,color .15s,transform .12s}
        .clear-btn.confirm{background:#fff6e8;color:#b26a00;border-color:#f1cf91}
        
        .piks{display:grid;grid-template-columns:repeat(8,var(--pik-size));gap:var(--pik-gap);justify-content:left}
        .pik{width:var(--pik-size);height:var(--pik-size);border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--tile-bg);border:1px solid var(--soft-border);cursor:pointer;position:relative;transition:all .15s}
        .pik:hover{transform:scale(1.1)}
        .pik:active{transform:scale(0.95)}
        .pik.own{background:var(--tile-bg-own);border-color:rgba(92,184,96,.34);box-shadow:var(--tile-shadow-own)}
        @keyframes popIn{0%{transform:scale(1.3)}50%{transform:scale(0.9)}100%{transform:scale(1)}}
        @keyframes bubblePop{0%{transform:scale(0)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
        .pik.na{cursor:default;pointer-events:none;background:#f5f5f5;position:relative}
        .pik.na::before{content:'';position:absolute;width:70%;height:2px;background:#888;transform:rotate(-45deg)}
        .pik .d{width:22px;height:22px;border-radius:50%;border:2px solid rgba(0,0,0,.12);box-shadow:inset 0 -2px 4px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:bold;color:#fff}
        .dot-num{pointer-events:none}
        .pik .d.white,.pik .d.ice,.pik .d.yellow{color:rgba(0,0,0,.58)}
        .pik .d.white{border-color:rgba(0,0,0,.18)}
        .pik .d.yellow{border-color:rgba(0,0,0,.16)}
        .pik .d.ice{border-color:rgba(0,0,0,.18)}
        .bubble{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;background:var(--accent);border-radius:8px;font-size:.6rem;font-weight:bold;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 3px;box-shadow:0 1px 3px rgba(0,0,0,.2);line-height:1}
        
        .miss-sec{margin-bottom:16px}
        .miss-head{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:8px}
        .miss-head h4{font-size:.9rem}
        .miss-grid{display:flex;flex-wrap:wrap;gap:6px}
        .miss-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;background:var(--card);font-size:.8rem;box-shadow:var(--shadow)}
        .miss-chip.confirm{background:#fff6e8;color:#b26a00;box-shadow:0 0 0 1px #f1cf91 inset}
        .miss-none{color:var(--accent);font-size:.85rem;font-weight:700}
        
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
        .modal.show{display:flex}
        .modal-box{background:var(--card);padding:18px 18px 14px;border-radius:24px;max-width:420px;width:90%;max-height:min(88vh,860px);overflow:auto;animation:modalIn .2s ease;box-shadow:0 8px 32px rgba(0,0,0,.2)}
        .modal-box.stats-modal{min-height:345px}
        @keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
        .modal-head h3{font-size:1.1rem}
        .modal-close{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;padding:4px 8px;border-radius:4px}
        .modal-close:hover{background:rgba(255,255,255,.1)}
        .drop{border:2px dashed rgba(255,255,255,.15);border-radius:10px;padding:36px;text-align:center;cursor:pointer;transition:all .15s}
        .drop:hover{border-color:var(--accent);background:rgba(74,222,128,.05)}
        .drop input{display:none}
        .scan-box input[type="file"]{display:none}
        .import-grid{display:grid;grid-template-columns:1fr;gap:10px}
        .scan-box{border:2px dashed rgba(0,0,0,.08);border-radius:14px;padding:14px 16px;text-align:center;background:#fafdfa;cursor:pointer;transition:all .15s}
        .scan-box:hover{border-color:var(--accent);background:#f4fbf4}
        .scan-box p{margin-top:6px;font-size:.8rem;color:var(--muted)}
        .scan-view{margin-top:16px;padding:14px;border-radius:18px;overflow:hidden;background:#f3f7f3;display:none;border:1px solid rgba(92,184,96,.12)}
        .scan-view.show{display:block}
        .scan-actions{display:flex;gap:8px;justify-content:center;margin-top:10px}
        
        .share-row{display:flex;gap:8px;align-items:center;justify-content:center}
        .share-action{min-width:138px;justify-content:center;display:inline-flex;align-items:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        .share-input{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.2);color:var(--text);font-size:.75rem;font-family:monospace}
        .share-input:focus{outline:none;border-color:var(--accent)}
        
        .toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:rgba(92,184,96,.88);color:#fff;padding:12px 24px;border-radius:25px;font-weight:700;font-size:.9rem;z-index:1001;box-shadow:0 4px 16px rgba(0,0,0,.12);opacity:0;pointer-events:none;transition:opacity .22s ease}
        .toast.show{opacity:1}
        .toast.center{top:50%;bottom:auto;left:50%;transform:translate(-50%,-50%);padding:14px 24px;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
        
        .empty{text-align:center;padding:32px;color:var(--muted)}
        .contact{margin-top:18px;text-align:center;color:var(--muted);font-size:.78rem}
        .contact a{color:var(--accent);text-decoration:none;font-weight:700}
        .contact a:hover{text-decoration:underline}
        
        /* 浮動按鈕組 */
        .float-btns{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:99;opacity:0;pointer-events:none;transition:opacity .2s}
        .float-btns.show{opacity:1;pointer-events:auto}
        .float-btn{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.88);color:var(--text);border:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.12);transition:all .2s}
        .float-btn:hover{transform:scale(1.08);box-shadow:0 4px 14px rgba(0,0,0,.18)}
        .float-btn:active{transform:scale(0.95)}
        .float-btn.primary{background:rgba(92,184,96,.86);color:#fff}
        .float-btn.share{background:rgba(92,184,96,.82);color:#fff}
        
        .hide-mobile{display:inline-flex}
        @media(max-width:330px){
            :root{--pik-size:min(34px, calc((100vw - 112px) / 8));--pik-gap:6px}
            .event-section{padding:8px}
            #listView,#missView{padding:0 8px}
            .item{padding:10px}
        }

        @media(max-width:460px){.hide-mobile{display:none}}
        
        /* 快捷鍵提示 */
        .kbd{display:inline-block;padding:2px 6px;background:rgba(255,255,255,.1);border-radius:4px;font-size:.7rem;color:var(--muted);margin-left:6px}
        
        
        @media(hover:hover){
            .event-tag:hover{background:#c8e6c9}
            .clear-btn:hover{background:#eeeeee;border-color:#cfcfcf;color:#4f4f4f}
        }

        .clear-btn:active{transform:scale(.96);background:#ebebeb}

        @media(max-width:460px){
            :root{--pik-size:min(38px, calc((100vw - 120px) / 8));--pik-gap:8px}
            .app{padding:0 0 120px}
            .header{padding:10px 12px;padding-top:max(10px,env(safe-area-inset-top));border-radius:0 0 12px 12px}
            .header-row{gap:8px}
            .logo{font-size:1.1rem}
            .stats{gap:6px}
            .stat b{font-size:1rem}
            .stat small{font-size:.65rem}
            .progress-ring svg{width:38px;height:36px}
            .progress-ring span{width:38px;height:36px;font-size:9px}
            .toolbar{top:72px;gap:6px;margin:8px 10px;padding:8px;border-radius:14px}
            .search{padding:8px 12px;font-size:.85rem}
            .btn{padding:8px 10px;font-size:.8rem}
            .views{margin:0 10px 10px}
            .view-btn{padding:10px 8px;font-size:.8rem}
            .filters{margin:0 10px 8px}
            .filter-grp{padding:3px 6px}
            .f-chip{padding:3px 4px;font-size:.6rem}
            .f-chip .cdot{width:8px;height:8px}
            .f-sep{display:none}
            .chip{padding:5px 8px;font-size:.75rem;flex-shrink:0}
            .event-section{margin:0 10px 10px;padding:10px}
            .event-chip{padding:5px 8px;font-size:.75rem}
            .event-tag{padding:4px 8px;font-size:.75rem}
            #listView,#missView{padding:0 10px}
            .item{padding:10px 12px;margin-bottom:8px}
            .item-row{margin-bottom:8px}
            .item-icon{font-size:1.1rem}
            .item-name{font-size:.85rem}
            .item-prog{font-size:.75rem}
            .clear-btn{display:inline-flex;align-items:center;justify-content:center;padding:4px 0;font-size:.65rem;font-weight:700;background:#f6f6f6;color:#666;width:var(--pik-size);box-sizing:border-box;text-align:center;border:1px solid #dddddd;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
            .clear-btn.confirm{background:#fff6e8;color:#b26a00;border-color:#f1cf91}
            .piks{display:grid;grid-template-columns:repeat(8,var(--pik-size));gap:var(--pik-gap);width:100%;box-sizing:border-box;justify-content:space-between}
            .pik{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--tile-bg);cursor:pointer;position:relative;transition:all .15s;width:var(--pik-size);height:var(--pik-size);box-sizing:border-box;border:1px solid var(--soft-border)}
            .pik:hover{transform:scale(1.08)}
            .pik:active{transform:scale(0.95)}
            .pik.own{background:var(--tile-bg-own);border-color:rgba(92,184,96,.34);box-shadow:0 0 0 1.5px var(--accent)}
            .miss-chip{padding:5px 10px;font-size:.75rem}
            .cat-head{padding:8px 0}
            .cat-head h3{font-size:.85rem}
            .float-btns{bottom:16px;right:16px}
            .float-btn{width:44px;height:44px;font-size:1.1rem}
            .import-grid{grid-template-columns:1fr}

// Compression Streams API 壓縮（用於縮短分享連結，無需外部庫）
async function compressToBase64Url(str) {
    const bytes = new TextEncoder().encode(str);
    const cs = new CompressionStream('gzip');
    const writer = cs.writable.getWriter();
    writer.write(bytes);
    writer.close();
    const buf = await new Response(cs.readable).arrayBuffer();
    const arr = new Uint8Array(buf);
    let binary = '';
    for (let i = 0; i < arr.length; i++) binary += String.fromCharCode(arr[i]);
    return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function decompressFromBase64Url(b64url) {
    let binary = atob(b64url.replace(/-/g, '+').replace(/_/g, '/'));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const cs = new DecompressionStream('gzip');
    const writer = cs.writable.getWriter();
    writer.write(bytes);
    writer.close();
    const buf = await new Response(cs.readable).arrayBuffer();
    return new TextDecoder().decode(buf);
}

const DATA_VERSION = 6;

const DECOR_BY_ID = Object.fromEntries([...REGULAR, ...EVENTS].map(decor => [decor.id, decor]));

function getShareOrderForDecor(decor){
    const colors = Object.keys(decor.c || {});
    if(colors.length === 7) return C7.filter(c => decor.c[c]);
    if(colors.length === 8) return C8.filter(c => decor.c[c]);
    return colors;
}

function getShareSlotsForDecor(decor){
    const slots = [];
    getShareOrderForDecor(decor).forEach(color => {
        const max = decor.c[color] || 0;
        for(let i=0;i<max;i++) slots.push([color, i]);
    });
    return slots;
}

function packOwnMap(ownMap){
    return Object.values(DECOR_BY_ID).map(decor => {
        const code = SHARE_CODE_BY_ID[decor.id];
        if(!code) return null;
        const digits = getShareSlotsForDecor(decor).map(([color, idx]) => {
            const v = ownMap[key(decor.id, color, idx)] || 0;
            return String(Math.max(0, Math.min(5, v)));
        }).join('');
        return /[1-5]/.test(digits) ? `${code}${digits}` : null;
    }).filter(Boolean);
}

function unpackOwnMapV6(arr){
    const out = {};
    (arr || []).forEach(entry => {
        if(typeof entry !== 'string' || entry.length < 3) return;
        const code = entry.slice(0, 2);
        const digits = entry.slice(2);
        const decorId = SHARE_ID_BY_CODE[code];
        const decor = DECOR_BY_ID[decorId];
        if(!decor) return;
        const slots = getShareSlotsForDecor(decor);
        if(digits.length !== slots.length) return;
        for(let i=0;i<digits.length;i++){
            const v = Number(digits[i]);
            if(!Number.isFinite(v) || v <= 0 || v > 5) continue;
            out[key(decor.id, slots[i][0], slots[i][1])] = v;
        }
    });
    return out;
}

function packEventCodes(events){
    return (events || []).map(id => SHARE_CODE_BY_ID[id]).filter(Boolean);
}

function packOwnMapForJson(ownMap){
    const out = {};
    packOwnMap(ownMap).forEach(entry=>{
        out[entry.slice(0,2)] = entry.slice(2);
    });
    return out;
}

function unpackOwnMapFromJson(obj){
    const arr = Object.entries(obj || {}).map(([code, digits]) => `${code}${digits}`);
    return unpackOwnMapV6(arr);
}

function unpackEventCodesV6(codes){
    return (codes || []).map(code => SHARE_ID_BY_CODE[code]).filter(id => !!id && !!EVENT_SHARE_CODES[id]);
}

async function encode(data){
    const payload = [DATA_VERSION, packOwnMap(data.o || {}), packEventCodes(data.e || [])];
    return await compressToBase64Url(JSON.stringify(payload));
}

        const raw = JSON.parse(await decompressFromBase64Url(str));
        if(Array.isArray(raw) && raw[0] === 6){
            return {o: unpackOwnMapV6(raw[1]), e: unpackEventCodesV6(raw[2])};
        }
        return null;
    }catch(e){return null;}
}
async function load(){
    const hash = location.hash.startsWith('#d=') ? location.hash.slice(3) : '';
    if(hash){
        const data = await decode(hash);
        history.replaceState(null,'',location.pathname);
        if(data){
            own = migrateLocalOwn(data.o || {});
            selectedEvents = data.e || [];
            save();
            toast('📥 已從連結載入資料');
            render();
            return;
        }
        centerToast('❌ 此分享連結無法使用\n請重新生成', 3000);
    }
    // 從 localStorage 載入（v2 格式）
    const s2 = localStorage.getItem('pik_v2');
    if(s2){
        const d=JSON.parse(s2);
        own = migrateLocalOwn(d.own || {});
        selectedEvents=d.events||[];
        render();
        return;
    }
}

function migrateLocalOwn(o){
    // 舊 boolean 格式 -> 數字格式
    const first = Object.values(o)[0];
    if(typeof first === 'boolean'){
        const converted = {};
        for(const [k,v] of Object.entries(o)) converted[k] = v ? 1 : 0;
        return converted;
    }
    return o;
}
function save(){
    localStorage.setItem('pik_v2',JSON.stringify({own,events:selectedEvents}));
}

function getActiveDecors(){
    const list = [...REGULAR];
    selectedEvents.forEach(eid=>{
        const ev = EVENTS.find(e=>e.id===eid);
        if(ev) list.push(ev);
    });
    return list;
}

function toggle(did,col,idx){
    const k=key(did,col,idx);
    const prev=own[k]||0;
    const next=prev>=5?0:prev+1;
    if(next===0)delete own[k];else own[k]=next;
    if(navigator.vibrate)navigator.vibrate(10);
    // Save bubble el before render destroys it
    const el=document.querySelector(`.pik[data-id="${did}"][data-color="${col}"][data-idx="${idx}"] .bubble`);
    const newEl=document.querySelector(`.pik[data-id="${did}"][data-color="${col}"][data-idx="${idx}"]`);
    save();render();
    if(el&&newEl){newEl.style.animation='none';newEl.offsetHeight;newEl.style.animation='bubblePop .3s ease';}
}
function clearD(did,cols){
    const d=getActiveDecors().find(x=>x.id===did);
    if(!d)return;
    if(pendingClear!==did){
        pendingClear=did;
        if(clearTimer)clearTimeout(clearTimer);
        clearTimer=setTimeout(()=>{pendingClear=null;render();},1600);
        render();
        toast('再按一次確認清空');
        return;
    }
    pendingClear=null;
    if(clearTimer)clearTimeout(clearTimer);
    cols.forEach(c=>{const max=d.c[c]||0;for(let i=0;i<max;i++)delete own[key(did,c,i)];});
    save();render();toast('🗑️ 已清空');
}

function fillMissingDecor(did, color){
    const token = did + '::' + color;
    const decor = getActiveDecors().find(x=>x.id===did);
    if(!decor || !decor.c[color]) return;
    if(pendingMissFill !== token){
        pendingMissFill = token;
        if(missFillTimer) clearTimeout(missFillTimer);
        missFillTimer = setTimeout(()=>{ pendingMissFill = null; render(); }, 1600);
        render();
        toast('再按一次確認補上');
        return;
    }
    pendingMissFill = null;
    if(missFillTimer) clearTimeout(missFillTimer);
    const max = decor.c[color] || 0;
    for(let i=0;i<max;i++){
        const k = key(did, color, i);
        if((own[k]||0) <= 0) own[k] = 1;
    }
    save();
    render();
    toast('✅ 已補上');
}

function toggleEvent(eid){
    if(selectedEvents.includes(eid)) selectedEvents=selectedEvents.filter(e=>e!==eid);
    else selectedEvents.push(eid);
    save(); render();
}

function stats(){
    const decors = getActiveDecors();
    let o=0,t=0;
    decors.forEach(d=>Object.entries(d.c).forEach(([col,max])=>{for(let i=0;i<max;i++){t++;if((own[key(d.id,col,i)]||0)>0)o++;}}));
    return {o,t,p:t>0?(o/t*100).toFixed(1):0};
}

function colorStats(){
    const decors = getActiveDecors();
    const cs={};C.forEach(c=>cs[c]={o:0,t:0});
    decors.forEach(d=>Object.entries(d.c).forEach(([col,max])=>{for(let i=0;i<max;i++){cs[col].t++;if((own[key(d.id,col,i)]||0)>0)cs[col].o++;}}));
    return cs;
}

function filterD(d){
    if(searchQ&&!d.n.includes(searchQ))return false;
    if(colorF!=='all'&&!d.c[colorF])return false;
    const entries=Object.entries(d.c);
    // Count collected dots
    let collected=0,total=0;
    entries.forEach(([col,max])=>{for(let i=0;i<max;i++){total++;if((own[key(d.id,col,i)]||0)>0)collected++;}});
    if(statusF==='done'&&collected!==total)return false;
    if(statusF==='miss'&&collected===total)return false;
    return true;
}

function renderList(){
    const decors = getActiveDecors();
    const regular = REGULAR.filter(filterD);
    const special = decors.filter(d=>!REGULAR.find(r=>r.id===d.id)).filter(filterD);
    let h='';
    if(regular.length){
        const cO=regular.reduce((s,d)=>s+Object.entries(d.c).reduce((s2,[c,max])=>s2+Array.from({length:max},(_,i)=>(own[key(d.id,c,i)]||0)>0?1:0).reduce((a,b)=>a+b,0),0),0);
        const cT=regular.reduce((s,d)=>s+Object.values(d.c).reduce((a,b)=>a+b,0),0);
        const closed=shut['regular'];
        h+=`<div class="cat"><div class="cat-head ${closed?'shut':''}" onclick="toggleCat('regular')"><span class="arr">▼</span><h3>常駐 Decor</h3><span class="cat-cnt">${cO}/${cT}</span></div><div class="cat-body ${closed?'hide':''}">`;
        regular.forEach(d=>h+=renderItem(d));
        h+=`</div></div>`;
    }
    if(special.length){
        const cO=special.reduce((s,d)=>s+Object.entries(d.c).reduce((s2,[c,max])=>s2+Array.from({length:max},(_,i)=>(own[key(d.id,c,i)]||0)>0?1:0).reduce((a,b)=>a+b,0),0),0);
        const cT=special.reduce((s,d)=>s+Object.values(d.c).reduce((a,b)=>a+b,0),0);
        const closed=shut['special'];
        h+=`<div class="cat"><div class="cat-head ${closed?'shut':''}" onclick="toggleCat('special')"><span class="arr">▼</span><h3>特殊活動 Decor</h3><span class="cat-cnt">${cO}/${cT}</span></div><div class="cat-body ${closed?'hide':''}">`;

function renderItem(d){
    let entries=Object.entries(d.c);
    if(entries.length===7){
        entries=C7.filter(c=>d.c[c]).map(c=>[c,d.c[c]]);
    }else if(entries.length===8){
        entries=C8.filter(c=>d.c[c]).map(c=>[c,d.c[c]]);
    }
    const total=entries.reduce((s,[,max])=>s+max,0);
    // Each dot (index) counts as 1 if collected (value>0), regardless of cycle count
    const cnt=entries.reduce((s,[c,max])=>s+Array.from({length:max},(_,i)=>(own[key(d.id,c,i)]||0)>0?1:0).reduce((a,b)=>a+b,0),0);
    const done=cnt===total;
    const cols=JSON.stringify(Object.keys(d.c)).replace(/"/g,"'");
    return `<div class="item ${done?'done':''}"><div class="item-row"><span class="item-icon">${d.i}</span><div class="item-info"><span class="item-name">${d.n}</span>${d.note?`<span class="item-sub">${d.note}</span>`:''}<span class="item-prog">${cnt}/${total}</span></div><div class="item-btns"><span class="clear-btn ${pendingClear===d.id?'confirm':''}" onclick="event.stopPropagation();clearD('${d.id}',${cols})">${pendingClear===d.id?'確認':'清空'}</span></div></div><div class="piks">${entries.flatMap(([c,max])=>Array.from({length:max},(_,i)=>{const val=own[key(d.id,c,i)]||0;const has=val>0;return`<div class="pik ${has?'own':''}" data-id="${d.id}" data-color="${c}" data-idx="${i}" onclick="toggle('${d.id}','${c}',${i})" title="${CN[c]}"><div class="d dot ${c}">${max>1?'<span class="dot-num">'+(i+1)+'</span>':''}</div>${has?`<span class="bubble">${val}</span>`:''}</div>`;})).join('')}</div></div>`;
}

function renderMiss(){
    const decors = getActiveDecors();
    // 計算每個顏色的缺失數並排序
    const colorData = C.map(c=>{
        const miss=[];
        let total=0;
        decors.forEach(d=>{
            if(!d.c[c]) return;
            if(searchQ && !d.n.includes(searchQ)) return;
            const max=d.c[c]||0;
            for(let i=0;i<max;i++){
                total++;
                if((own[key(d.id,c,i)]||0)>0) continue;
                miss.push({decor:d, index:i, max});
            }
        });
        return {c, miss, total, owned:total-miss.length};
    }); // 固定顏色順序：紅→黃→藍→紫→白→岩→翼→冰
    
    let h='';
    colorData.forEach(({c,miss,total,owned})=>{
        if(colorF!=='all'&&colorF!==c)return;
        if(statusF==='done')return;
        const pct=total>0?Math.round(owned/total*100):0;
        h+=`<div class="miss-sec"><div class="miss-head"><div class="dot ${c}"></div><h4>${CN[c]} Pikmin</h4><span style="color:var(--muted);font-size:.8rem;margin-left:8px">${owned}/${total} (${pct}%)</span></div><div class="miss-grid">${miss.length?miss.map(item=>{const d=item.decor;const token=d.id+'::'+c;const suffix=item.max>1?` ${item.index+1}`:'';return `<div class="miss-chip ${pendingMissFill===token?'confirm':''}" onclick="fillMissingDecor('${d.id}','${c}')">${d.i} ${d.n}${suffix}</div>`;}).join(''):'<span class="miss-none">✨ 全部收集完成！</span>'}</div></div>`;
    });
    if(!h)h='<div class="empty">沒有匹配項</div>';
    document.getElementById('missView').innerHTML=h;
}

    return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '') || window.innerWidth <= 460;
}

function shareImageFilename(){
    const d = new Date();
    const pad = n => String(n).padStart(2,'0');
    return `皮口普查-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}.png`;
}

async function buildShareCardDataUrl(){
    const qr = document.getElementById('shareQr');
    if(!qr || !cachedShareUrl) return null;
    const st = stats();
    const canvas = document.createElement('canvas');
    canvas.width = 1080;
    canvas.height = 1420;
    const ctx = canvas.getContext('2d');
    const logoUrl = 'https://lh3.googleusercontent.com/U5Jp2yTMY_iiDlObsDYWeTZDjeEpBynvXiSFYJQO5hIJXAddeXbpSwaw2eE4RHB4ZBqa7NXrrVcyLcCWCFwaKoX42qKYO_JOg1oIFl-loDHZ5zQ=e365-pa-nu-w200';

    const loadImg = (src) => new Promise((resolve,reject)=>{
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = ()=>resolve(img);
        img.onerror = reject;
        img.src = src;
    });

    const grad = ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,'#f7fdf7');
    grad.addColorStop(1,'#e8f6ea');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const decoDots = [
        {x:120,y:120,r:18,c:'#ec407a'},{x:208,y:90,r:11,c:'#fdd835'},{x:954,y:130,r:18,c:'#26c6da'},
        {x:886,y:92,r:10,c:'#8e24aa'},{x:996,y:190,r:12,c:'#1e88e5'},{x:106,y:1220,r:14,c:'#5cb860'}
    ];
    decoDots.forEach(d=>{ctx.fillStyle=d.c;ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill();});

    ctx.shadowColor = 'transparent';

    const logo = await loadImg(logoUrl).catch(()=>null);
    if(logo){
        const boxX=214, boxY=102, boxW=128, boxH=96;
        const scale=Math.min(boxW/logo.width, boxH/logo.height);
        const w=logo.width*scale, h=logo.height*scale;
        ctx.drawImage(logo, boxX+(boxW-w)/2, boxY+(boxH-h)/2, w, h);
    }

    ctx.textAlign = 'center';
    ctx.fillStyle = '#5cb860';
    ctx.font = '800 56px Nunito, sans-serif';
    ctx.fillText('皮口普查', canvas.width/2, 166);
    ctx.fillStyle = '#222';
    ctx.font = '700 34px Nunito, sans-serif';
    ctx.fillText('多裝置共享進度', canvas.width/2, 252);

    ctx.fillStyle = '#eef8ef';
    ctx.beginPath();
    ctx.roundRect(180, 276, 720, 100, 26);
    ctx.fill();
    ctx.fillStyle = '#5cb860';
    ctx.font = '800 44px Nunito, sans-serif';
    ctx.fillText(`${st.o} / ${st.t}`, 400, 331);
    ctx.fillStyle = '#7b887b';
    ctx.font = '700 26px Nunito, sans-serif';
    ctx.fillText(`完成率 ${st.p}%`, 705, 331);

    ctx.fillStyle = '#f7fbf7';
    ctx.beginPath();
    ctx.roundRect(52, 354, 976, 976, 60);
    ctx.fill();
    ctx.strokeStyle = 'rgba(92,184,96,.10)';
    ctx.lineWidth = 2;
    ctx.stroke();

    const qrImg = await loadImg(qr.src);
    ctx.drawImage(qrImg, 66, 368, 948, 948);

    const accents = [
        {x:34,y:370,t:'🌱'},{x:1046,y:370,t:'🌼'},{x:34,y:1358,t:'✨'},{x:1046,y:1358,t:'🍃'}
    ];
    accents.forEach(a=>{ctx.font='34px Nunito, sans-serif';ctx.fillText(a.t,a.x,a.y);});

    ctx.fillStyle = '#4f9e55';
    ctx.font = '700 28px Nunito, sans-serif';
    ctx.fillText('掃描二維碼即可開啟目前進度', canvas.width/2, 1360);
    ctx.fillStyle = '#9aa39b';
    ctx.font = '600 22px Nunito, sans-serif';
    ctx.fillText('Generated by 皮口普查', canvas.width/2, 1404);

    return canvas.toDataURL('image/png');
}

async function saveShareQr(){
    const dataUrl = await buildShareCardDataUrl();
    if(!dataUrl) return;
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = shareImageFilename();
    document.body.appendChild(a);
    a.click();
    a.remove();
}


let qrScanner = null;

    document.getElementById('modal').querySelector('.modal-box').classList.remove('stats-modal');
    document.getElementById('modalTitle').textContent = '📥 匯入資料';
    document.getElementById('modalContent').innerHTML = `
        <div class="import-grid">
            <div class="scan-box" id="scanStart"><div style="font-size:1.8rem">📷</div><strong>掃碼匯入</strong><p>複雜二維碼建議用系統相機掃描</p></div>
            <div id="scanView" class="scan-view">
                <div id="qrReader" style="width:100%;max-width:360px;margin:0 auto"></div>
                <div class="scan-actions"><button class="btn" onclick="stopQrScan()">停止掃描</button></div>
            </div>
            <div class="scan-box" id="linkImportBox" style="cursor:default;text-align:left">
                <div style="font-size:1.6rem;text-align:center">🔗</div>
                <strong style="display:block;text-align:center">連結匯入</strong>
                <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
                    <input id="linkImportInput" class="search" style="min-width:0;flex:1" placeholder="貼上分享連結...">
                    <button class="btn primary" id="linkImportBtn" type="button">匯入</button>
                    <button class="btn" id="linkPasteBtn" type="button">貼上</button>
                </div>
            </div>
            <div class="scan-box" id="drop"><div style="font-size:1.8rem">📁</div><strong>JSON 匯入</strong><p>點擊或拖曳 JSON 檔案</p><input type="file" id="fileIn" accept=".json"></div>
            <div class="scan-box" id="scanImageBtn"><div style="font-size:1.5rem">🖼️</div><strong>識別二維碼圖片</strong><p>從相冊選擇二維碼圖片</p><input type="file" id="qrImageIn" accept="image/*"></div>
        </div>`;
    openModal();

}

function setupDrop(){
    const drop=document.getElementById('drop'),fi=document.getElementById('fileIn');
    if(!drop||!fi)return;
    drop.onclick=(e)=>{ if(e.target.id!=='fileIn') fi.click(); };
    fi.onchange=e=>e.target.files[0]&&importFile(e.target.files[0]);
    drop.ondragover=e=>{e.preventDefault();drop.style.borderColor='var(--accent)';};
    drop.ondragleave=()=>drop.style.borderColor='';
    drop.ondrop=e=>{e.preventDefault();drop.style.borderColor='';e.dataTransfer.files[0]&&importFile(e.dataTransfer.files[0]);};
}

function setupQrImport(){
    const scanBtn = document.getElementById('scanStart');
    const qrImageIn = document.getElementById('qrImageIn');
    const scanImageBtn = document.getElementById('scanImageBtn');
    if(scanBtn) scanBtn.onclick = ()=>startQrScan();
    if(scanImageBtn) scanImageBtn.onclick = (e)=>{ if(e.target.id!=='qrImageIn') qrImageIn.click(); };
    if(qrImageIn) qrImageIn.onchange = async e=>{ if(e.target.files[0]) await scanQrImage(e.target.files[0]); };
}

function setupLinkImport(){
    const input = document.getElementById('linkImportInput');
    const importBtn = document.getElementById('linkImportBtn');
    const pasteBtn = document.getElementById('linkPasteBtn');
    if(importBtn) importBtn.onclick = ()=>applySharedLink((input && input.value || '').trim());
    if(input) input.onkeydown = e=>{ if(e.key === 'Enter'){ e.preventDefault(); applySharedLink(input.value.trim()); } };
    if(pasteBtn) pasteBtn.onclick = async ()=>{
        if(!navigator.clipboard || !navigator.clipboard.readText){
            if(input) input.focus();
            toast('請手動貼上連結');
            return;
        }
        try{
            const text = await navigator.clipboard.readText();
            if(input) input.value = text.trim();
        }catch(e){
            toast('❌ 無法讀取剪貼板');
        }
    };
}

async function applySharedLink(url){
    try{
        const text = String(url || '').trim();
        const match = text.match(/#d=([^\s]+)/);
        const raw = match ? match[1].trim() : text;
        if(!raw) throw new Error('no data');
        const data = await decode(raw);
        if(!data) throw new Error('bad data');
        own = migrateLocalOwn(data.o || {});
        selectedEvents = data.e || [];
        save(); render();
        stopQrScan();
        closeModal();
        toast('📥 匯入成功');
    }catch(e){
        centerToast('❌ 無法識別分享碼');
    }
}

async function startQrScan(){
    const scanView = document.getElementById('scanView');
    const readerEl = document.getElementById('qrReader');
    if(!window.Html5Qrcode){ toast('❌ 掃碼器載入失敗'); return; }
    if(!scanView || !readerEl) return;
    scanView.classList.add('show');
    if(qrScanner){ try{ await qrScanner.stop(); }catch(_){} try{ await qrScanner.clear(); }catch(_){} }
    qrScanner = new Html5Qrcode('qrReader');
    try{
        await qrScanner.start(
            { facingMode: 'environment' },
            { fps: 10, qrbox: { width: Math.min(window.innerWidth - 120, 280), height: Math.min(window.innerWidth - 120, 280) } },
            async decodedText => { await applySharedLink(decodedText); },
            () => {}
        );
    }catch(e){
        scanView.classList.remove('show');
        toast('❌ 無法打開相機');
    }
}

async function stopQrScan(){
    const scanView = document.getElementById('scanView');
    if(scanView) scanView.classList.remove('show');
    if(qrScanner){
        try{ await qrScanner.stop(); }catch(_){}
        try{ await qrScanner.clear(); }catch(_){}
        qrScanner = null;
    }
}

async function scanQrImage(file){
    if(!window.Html5Qrcode){ toast('❌ 掃碼器載入失敗'); return; }
    try{
        const scanner = new Html5Qrcode('qrReader');
        const decoded = await scanner.scanFile(file, true);
        await scanner.clear();
        await applySharedLink(decoded);
    }catch(e){
        toast('❌ 無法識別圖片中的二維碼');
    }
}

async function exportData(fromShare=false){
    const d={v:DATA_VERSION,decor:packOwnMapForJson(own),events:packEventCodes(selectedEvents)};
    const j=JSON.stringify(d,null,2);
    const b=new Blob([j],{type:'application/json'});
    const a=document.createElement('a');
    const href=URL.createObjectURL(b);
    a.href=href;
    a.download='pikmin_'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(href),1000);
    if(fromShare){
        const btns=document.querySelectorAll('.share-action');
        btns.forEach(b=>{b.blur();b.style.transform='none';});
        centerToast('✅ 已下載 JSON');
    }else{
        toast('📤 已匯出');
    }
}

async function importFile(f){
    const r=new FileReader();
    r.onload=async e=>{try{
        const raw=e.target.result;
        const j=JSON.parse(raw);
        if(!(j && j.v === 6 && j.decor && typeof j.decor === 'object')) throw new Error('bad json');
        own = unpackOwnMapFromJson(j.decor);
        selectedEvents = unpackEventCodesV6(j.events || []);
        save();render();
        closeModal();
        toast('📥 匯入成功');
    }catch(e){toast('❌ 格式錯誤');}};
    r.readAsText(f);
}

let toastTimer = null;
let toastSeq = 0;
function clearToastState(){
    const t=document.getElementById('toast');
    t.classList.remove('show');
    t.classList.remove('center');
    if(toastTimer){clearTimeout(toastTimer);toastTimer=null;}
}
function toast(m){
    const t=document.getElementById('toast');
    const seq = ++toastSeq;
    if(toastTimer)clearTimeout(toastTimer);
    t.classList.remove('show');
    t.classList.remove('center');
    t.textContent=m;
    requestAnimationFrame(()=>{
        if(toastSeq!==seq)return;
        t.classList.add('show');
        toastTimer=setTimeout(()=>{
            if(toastSeq!==seq)return;
            t.classList.remove('show');
        },2500);
    });
}
function centerToast(m, duration=1600){
    // Use a completely separate element for center notifications
    let c=document.getElementById('centerToast');
    if(!c){
        c=document.createElement('div');
        c.id='centerToast';
        c.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);max-width:min(84vw,320px);background:rgba(24,24,24,.92);color:#fff;padding:14px 20px;border-radius:18px;font-weight:700;font-size:.92rem;line-height:1.5;z-index:1002;opacity:0;pointer-events:none;transition:opacity .2s;box-shadow:0 10px 30px rgba(0,0,0,.22);text-align:center;white-space:pre-line';
        document.body.appendChild(c);
    }
    const el=c;
    el.textContent=m;
    el.style.opacity='0';
    requestAnimationFrame(()=>{ el.style.opacity='1'; });
    if(window._centerToastTimer)clearTimeout(window._centerToastTimer);
    window._centerToastTimer=setTimeout(()=>{
        el.style.opacity='0';
        setTimeout(()=>{ if(window._centerToastTimer)el.style.opacity='0'; },220);
    },duration);
}
