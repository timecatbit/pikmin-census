<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin Bloom 人口普查 🌱</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #ff6b6b;
            --yellow: #ffd93d;
            --blue: #4dabf7;
            --purple: #cc5de8;
            --white: #f8f9fa;
            --rock: #868e96;
            --winged: #f783ac;
            --ice: #66d9e8;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent: #4ade80;
            --accent-glow: rgba(74, 222, 128, 0.3);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        .app {
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
        }

        /* 顶部统计栏 - 固定 */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-dark);
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }

        .stats-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 800;
        }

        .logo-icon {
            font-size: 1.8rem;
        }

        .stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .progress-ring {
            width: 60px;
            height: 60px;
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 6;
        }

        .progress-ring .bg { stroke: rgba(255,255,255,0.1); }
        .progress-ring .progress {
            stroke: var(--accent);
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            transition: stroke-dashoffset 0.5s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            font-weight: 700;
            fill: var(--text);
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 12px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-dark);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        button:hover { transform: translateY(-2px); }

        /* 颜色筛选 */
        .color-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .color-filter {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 20px;
            background: var(--bg-card);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .color-filter:hover { background: var(--bg-hover); }
        .color-filter.active { border-color: var(--accent); }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .filter-btns {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }

        .filter-btn {
            padding: 8px 14px;
            border-radius: 20px;
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 装饰列表 - 紧凑版 */
        .decor-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .decor-item {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 14px 18px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .decor-item:hover {
            border-color: rgba(74, 222, 128, 0.3);
        }

        .decor-item.complete {
            border-color: var(--accent);
            background: rgba(74, 222, 128, 0.05);
        }

        .decor-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .decor-info {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 160px;
        }

        .decor-icon { font-size: 1.5rem; }

        .decor-name {
            font-weight: 700;
            font-size: 1rem;
        }

        .decor-count {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 600;
        }

        .pikmin-row {
            display: flex;
            gap: 6px;
            flex: 1;
            justify-content: flex-end;
        }

        .pikmin-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid transparent;
            background: rgba(0,0,0,0.2);
            transition: all 0.15s;
            position: relative;
        }

        .pikmin-btn:hover { transform: scale(1.1); }

        .pikmin-btn.owned {
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .pikmin-btn.owned::after {
            content: '✓';
            position: absolute;
            top: -4px;
            right: -4px;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-dark);
            font-weight: bold;
        }

        .pikmin-btn.unavailable {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .pikmin-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
        }

        .pikmin-dot.red { background: var(--red); }
        .pikmin-dot.yellow { background: var(--yellow); }
        .pikmin-dot.blue { background: var(--blue); }
        .pikmin-dot.purple { background: var(--purple); }
        .pikmin-dot.white { background: var(--white); }
        .pikmin-dot.rock { background: var(--rock); }
        .pikmin-dot.winged { background: var(--winged); }
        .pikmin-dot.ice { background: var(--ice); }

        .decor-actions {
            display: flex;
            gap: 6px;
            margin-left: 10px;
        }

        .action-btn {
            padding: 6px 10px;
            font-size: 0.75rem;
            border-radius: 6px;
            background: rgba(0,0,0,0.3);
            color: var(--text-muted);
        }

        .action-btn:hover {
            color: var(--accent);
        }

        /* 分类标题 */
        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 0;
            margin-top: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .category-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .category-count {
            font-size: 0.85rem;
            color: var(--accent);
            margin-left: auto;
        }

        .category-toggle {
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .category-header.collapsed .category-toggle {
            transform: rotate(-90deg);
        }

        .category-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 10px;
        }

        .category-content.hidden { display: none; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            border: 1px solid var(--border);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            padding: 0;
            width: 36px;
            height: 36px;
        }

        .file-drop {
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-drop:hover, .file-drop.dragover {
            border-color: var(--accent);
            background: rgba(74, 222, 128, 0.05);
        }

        .file-drop input { display: none; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: var(--bg-dark);
            padding: 14px 28px;
            border-radius: 30px;
            font-weight: 700;
            transition: transform 0.3s ease;
            z-index: 1001;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        .no-results {
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
        }

        @media (max-width: 700px) {
            .decor-row { flex-wrap: wrap; }
            .decor-info { min-width: 100%; margin-bottom: 10px; }
            .pikmin-row { justify-content: flex-start; }
            .stats { gap: 12px; }
            .stat-value { font-size: 1.2rem; }
            .decor-actions { margin-left: auto; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="stats-row">
                <div class="logo">
                    <span class="logo-icon">🌱</span>
                    <span>Pikmin 普查</span>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="owned-count">0</div>
                        <div class="stat-label">已收集</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="total-count">0</div>
                        <div class="stat-label">总数</div>
                    </div>
                    <svg class="progress-ring" viewBox="0 0 60 60">
                        <circle class="bg" cx="30" cy="30" r="26"/>
                        <circle class="progress" id="progress-circle" cx="30" cy="30" r="26" 
                                stroke-dasharray="163.36" stroke-dashoffset="163.36"/>
                        <text class="progress-text" x="30" y="34" text-anchor="middle" id="progress-text">0%</text>
                    </svg>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <input type="text" class="search-box" placeholder="🔍 搜索..." oninput="filterDecors(this.value)">
            <button class="btn-secondary" onclick="openImportModal()">📥 导入</button>
            <button class="btn-secondary" onclick="exportData()">📤 导出</button>
            <button class="btn-secondary" onclick="resetData()">🔄 重置</button>
        </div>

        <div class="color-filters">
            <div class="color-filter" onclick="toggleColorFilter('all')" data-color="all">
                <span>全部</span>
            </div>
            <div class="color-filter" onclick="toggleColorFilter('red')" data-color="red">
                <div class="color-dot" style="background:var(--red)"></div><span id="stat-red">0</span>
            </div>
            <div class="color-filter" onclick="toggleColorFilter('yellow')" data-color="yellow">
                <div class="color-dot" style="background:var(--yellow)"></div><span id="stat-yellow">0</span>
            </div>
            <div class="color-filter" onclick="toggleColorFilter('blue')" data-color="blue">
                <div class="color-dot" style="background:var(--blue)"></div><span id="stat-blue">0</span>
            </div>
            <div class="color-filter" onclick="toggleColorFilter('purple')" data-color="purple">
                <div class="color-dot" style="background:var(--purple)"></div><span id="stat-purple">0</span>
            </div>
            <div class="color-filter" onclick="toggleColorFilter('white')" data-color="white">
                <div class="color-dot" style="background:var(--white)"></div><span id="stat-white">0</span>
            </div>
            <div class="color-filter" onclick="toggleColorFilter('rock')" data-color="rock">
                <div class="color-dot" style="background:var(--rock)"></div><span id="stat-rock">0</span>
            </div>
            <div class="color-filter" onclick="toggleColorFilter('winged')" data-color="winged">
                <div class="color-dot" style="background:var(--winged)"></div><span id="stat-winged">0</span>
            </div>
            <div class="color-filter" onclick="toggleColorFilter('ice')" data-color="ice">
                <div class="color-dot" style="background:var(--ice)"></div><span id="stat-ice">0</span>
            </div>
            <div class="filter-btns">
                <button class="filter-btn active" onclick="setStatusFilter('all', this)">全部</button>
                <button class="filter-btn" onclick="setStatusFilter('incomplete', this)">未完成</button>
                <button class="filter-btn" onclick="setStatusFilter('complete', this)">已完成</button>
            </div>
        </div>

        <div id="decor-container"></div>
    </div>

    <div class="modal" id="import-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📥 导入数据</h2>
                <button class="modal-close" onclick="closeImportModal()">×</button>
            </div>
            <div class="file-drop" id="file-drop">
                <p style="font-size:2rem;margin-bottom:10px">📁</p>
                <p>点击选择或拖拽 JSON 文件</p>
                <input type="file" id="file-input" accept=".json" onchange="handleFileSelect(event)">
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const PIKMIN = ['red','yellow','blue','purple','white','rock','winged','ice'];
        const PIKMIN_NAMES = {red:'红',yellow:'黄',blue:'蓝',purple:'紫',white:'白',rock:'岩',winged:'飞',ice:'冰'};

        // 根据 Pikipedia 核实的数据
        const DECOR_DATA = {

                { id: 'roadside_coin', name: '路边(硬币)', icon: '🪙', types: PIKMIN },

                { id: 'movie', name: '电影院', icon: '🎬', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'pharmacy', name: '药房', icon: '💊', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'zoo', name: '动物园', icon: '🦁', types: ['red','yellow','blue','purple','white','rock','winged'] },

                { id: 'postoffice', name: '邮局', icon: '📮', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'artgallery', name: '美术馆', icon: '🎨', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'airport', name: '机场', icon: '✈️', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'station', name: '车站', icon: '🚉', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'beach', name: '海滩', icon: '🏖️', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'burger', name: '汉堡店', icon: '🍔', types: ['red','yellow','blue','purple','white','rock','winged'] },

                { id: 'supermarket', name: '超市', icon: '🛒', types: ['red','yellow','blue','purple','white','rock','winged'] },

                { id: 'park_clover', name: '公园(三叶草)', icon: '☘️', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'park_4leaf', name: '公园(四叶草)', icon: '🍀', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'library', name: '图书馆', icon: '📚', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'stadium', name: '体育场', icon: '🏟️', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'mountain', name: '山', icon: '⛰️', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'hotel', name: '酒店', icon: '🏨', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'temple', name: '寺庙/神社', icon: '⛩️', types: ['red','yellow','blue','purple','white','rock','winged'] },
            ],
            "餐厅类型": [
                { id: 'italian', name: '意大利餐厅', icon: '🍝', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'ramen', name: '拉面店', icon: '🍜', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'sushi', name: '寿司店', icon: '🍣', types: ['red','yellow','blue','purple','white','rock','winged'] },
            ],
            "特殊地点": [
                { id: 'themepark', name: '主题公园', icon: '🎢', types: ['red','yellow','blue'] },
                { id: 'appliance', name: '电器店', icon: '📺', types: ['yellow'] },
                { id: 'university', name: '大学', icon: '🎓', types: ['red','yellow','blue'] },
            ],
            "天气": [
                { id: 'rainy', name: '雨天', icon: '🌧️', types: PIKMIN },
                { id: 'snowy', name: '雪天', icon: '❄️', types: PIKMIN },
            ],
            "活动限定": [
                { id: 'lunar', name: '农历新年', icon: '🧧', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'chess', name: '国际象棋', icon: '♟️', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'hanafuda', name: '花札', icon: '🎴', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'mahjong', name: '麻将', icon: '🀄', types: PIKMIN },
                { id: 'kopparite', name: 'Kopparite矿石', icon: '💎', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'fingerboard', name: '滑板', icon: '🛹', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'mitten', name: '手套', icon: '🧤', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'present', name: '礼物', icon: '🎁', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'spring', name: '春季', icon: '🌸', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'summer', name: '夏季', icon: '🌻', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'autumn', name: '秋季', icon: '🍂', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'halloween', name: '万圣节', icon: '🎃', types: ['red','yellow','blue','purple','white','rock','winged'] },
                { id: 'winter', name: '冬季', icon: '⛄', types: ['red','yellow','blue','purple','white','rock','winged'] },
            ]
        };

        let collection = {};
        let searchQuery = '';
        let colorFilter = 'all';
        let statusFilter = 'all';
        let collapsedCategories = {};

        function init() {
            loadData();
            render();
            updateStats();
        }

        function loadData() {
            const saved = localStorage.getItem('pikmin_census_v3');
            collection = saved ? JSON.parse(saved) : {};
        }

        function saveData() {
            localStorage.setItem('pikmin_census_v3', JSON.stringify(collection));
        }

        function getKey(decorId, pikminId) {
            return `${decorId}_${pikminId}`;
        }

        function toggleOwned(decorId, pikminId, available) {
            if (!available) return;
            const key = getKey(decorId, pikminId);
            collection[key] = !collection[key];
            saveData();
            render();
            updateStats();
        }

        function fillDecor(decorId, types) {
            types.forEach(t => {
                collection[getKey(decorId, t)] = true;
            });
            saveData();
            render();
            updateStats();
            showToast('✅ 已全选');
        }

        function clearDecor(decorId, types) {
            types.forEach(t => {
                delete collection[getKey(decorId, t)];
            });
            saveData();
            render();
            updateStats();
            showToast('🗑️ 已清空');
        }

        function toggleCategory(cat) {
            collapsedCategories[cat] = !collapsedCategories[cat];
            render();
        }

        function render() {
            const container = document.getElementById('decor-container');
            let html = '';

            for (const [category, decors] of Object.entries(DECOR_DATA)) {
                const filteredDecors = decors.filter(d => {
                    // 搜索
                    if (searchQuery && !d.name.includes(searchQuery)) return false;
                    // 颜色筛选
                    if (colorFilter !== 'all' && !d.types.includes(colorFilter)) return false;
                    // 状态筛选
                    const owned = d.types.filter(t => collection[getKey(d.id, t)]).length;
                    const total = d.types.length;
                    if (statusFilter === 'complete' && owned !== total) return false;
                    if (statusFilter === 'incomplete' && owned === total) return false;
                    return true;
                });

                if (filteredDecors.length === 0) continue;

                const catOwned = filteredDecors.reduce((sum, d) => 
                    sum + d.types.filter(t => collection[getKey(d.id, t)]).length, 0);
                const catTotal = filteredDecors.reduce((sum, d) => sum + d.types.length, 0);
                const collapsed = collapsedCategories[category];

                html += `
                    <div class="category-header ${collapsed ? 'collapsed' : ''}" onclick="toggleCategory('${category}')">
                        <span class="category-toggle">▼</span>
                        <h3>${category}</h3>
                        <span class="category-count">${catOwned}/${catTotal}</span>
                    </div>
                    <div class="category-content ${collapsed ? 'hidden' : ''}">
                `;

                for (const decor of filteredDecors) {
                    const owned = decor.types.filter(t => collection[getKey(decor.id, t)]).length;
                    const total = decor.types.length;
                    const isComplete = owned === total;

                    html += `
                        <div class="decor-item ${isComplete ? 'complete' : ''}">
                            <div class="decor-row">
                                <div class="decor-info">
                                    <span class="decor-icon">${decor.icon}</span>
                                    <div>
                                        <div class="decor-name">${decor.name}</div>
                                        <div class="decor-count">${owned}/${total}</div>
                                    </div>
                                </div>
                                <div class="pikmin-row">
                                    ${PIKMIN.map(p => {
                                        const available = decor.types.includes(p);
                                        const isOwned = available && collection[getKey(decor.id, p)];
                                        return `
                                            <div class="pikmin-btn ${isOwned ? 'owned' : ''} ${!available ? 'unavailable' : ''}"
                                                 onclick="toggleOwned('${decor.id}', '${p}', ${available})"
                                                 title="${PIKMIN_NAMES[p]}">
                                                <div class="pikmin-dot ${p}"></div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                                <div class="decor-actions">
                                    <button class="action-btn" onclick="event.stopPropagation();fillDecor('${decor.id}', ${JSON.stringify(decor.types)})">全选</button>
                                    <button class="action-btn" onclick="event.stopPropagation();clearDecor('${decor.id}', ${JSON.stringify(decor.types)})">清空</button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                html += '</div>';
            }

            if (!html) {
                html = '<div class="no-results"><p style="font-size:3rem">🔍</p><p>没有找到匹配项</p></div>';
            }

            container.innerHTML = html;
        }

        function updateStats() {
            let owned = 0, total = 0;
            const colorStats = {};
            PIKMIN.forEach(p => colorStats[p] = { owned: 0, total: 0 });

            for (const decors of Object.values(DECOR_DATA)) {
                for (const d of decors) {
                    for (const t of d.types) {
                        total++;
                        colorStats[t].total++;
                        if (collection[getKey(d.id, t)]) {
                            owned++;
                            colorStats[t].owned++;
                        }
                    }
                }
            }

            document.getElementById('owned-count').textContent = owned;
            document.getElementById('total-count').textContent = total;
            
            const pct = total > 0 ? (owned / total * 100) : 0;
            document.getElementById('progress-text').textContent = pct.toFixed(1) + '%';
            const circumference = 2 * Math.PI * 26;
            document.getElementById('progress-circle').style.strokeDashoffset = 
                circumference - (pct / 100) * circumference;

            PIKMIN.forEach(p => {
                document.getElementById(`stat-${p}`).textContent = 
                    `${colorStats[p].owned}/${colorStats[p].total}`;
            });
        }

        function toggleColorFilter(color) {
            colorFilter = colorFilter === color ? 'all' : color;
            document.querySelectorAll('.color-filter').forEach(el => {
                el.classList.toggle('active', el.dataset.color === colorFilter);
            });
            render();
        }

        function setStatusFilter(status, btn) {
            statusFilter = status;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function filterDecors(query) {
            searchQuery = query;
            render();
        }

        function exportData() {
            const data = {
                version: 3,
                date: new Date().toISOString(),
                collection: collection
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `pikmin_census_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            showToast('📤 已导出');
        }

        function openImportModal() {
            document.getElementById('import-modal').classList.add('active');
        }

        function closeImportModal() {
            document.getElementById('import-modal').classList.remove('active');
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.collection) {
                        collection = data.collection;
                    } else if (typeof data === 'object') {
                        collection = data;
                    }
                    saveData();
                    render();
                    updateStats();
                    closeImportModal();
                    showToast('📥 导入成功');
                } catch (err) {
                    showToast('❌ 文件格式错误');
                }
            };
            reader.readAsText(file);
        }

        // 拖拽支持
        const dropZone = document.getElementById('file-drop');
        dropZone.addEventListener('click', () => document.getElementById('file-input').click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                document.getElementById('file-input').files = e.dataTransfer.files;
                handleFileSelect({ target: { files: [file] } });
            }
        });

        function resetData() {
            if (confirm('确定要重置所有数据吗？')) {
                collection = {};
                saveData();
                render();
                updateStats();
                showToast('🔄 已重置');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeImportModal();
        });

        init();
    </script>
</body>
</html>
