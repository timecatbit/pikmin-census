<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin Bloom 人口普查 🌱</title>
    <style>
        :root {
            --red:#ff6b6b; --yellow:#ffd93d; --blue:#4dabf7; --purple:#cc5de8;
            --white:#f8f9fa; --rock:#868e96; --winged:#f783ac; --ice:#66d9e8;
            --bg:#0f172a; --card:#1e293b; --accent:#4ade80; --text:#f1f5f9; --muted:#64748b;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        
        .app{max-width:1100px;margin:0 auto;padding:12px}
        
        /* 頂欄 */
        .header{position:sticky;top:0;z-index:100;background:var(--bg);padding:10px 0;border-bottom:1px solid rgba(255,255,255,.1)}
        .header-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
        .logo{font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:6px}
        .stats{display:flex;gap:12px;margin-left:auto}
        .stat{text-align:center}
        .stat b{color:var(--accent);font-size:1.2rem}
        .stat small{display:block;font-size:.7rem;color:var(--muted)}
        
        /* 工具列 */
        .toolbar{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
        .search{flex:1;min-width:140px;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:var(--card);color:var(--text);font-size:.9rem}
        .search:focus{outline:none;border-color:var(--accent)}
        .btn{padding:10px 14px;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;background:var(--card);color:var(--text);border:1px solid rgba(255,255,255,.1)}
        .btn:hover{border-color:var(--accent)}
        .btn.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
        
        /* 篩選列 */
        .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
        .chip{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:15px;background:var(--card);font-size:.8rem;cursor:pointer;border:1px solid transparent}
        .chip:hover{border-color:var(--muted)}
        .chip.on{border-color:var(--accent);color:var(--accent)}
        .dot{width:12px;height:12px;border-radius:50%}
        .dot.red{background:var(--red)}.dot.yellow{background:var(--yellow)}.dot.blue{background:var(--blue)}
        .dot.purple{background:var(--purple)}.dot.white{background:var(--white)}.dot.rock{background:var(--rock)}
        .dot.winged{background:var(--winged)}.dot.ice{background:var(--ice)}
        .spacer{flex:1}
        
        /* 視圖切換 */
        .views{display:flex;gap:6px;margin-bottom:12px}
        .view-btn{padding:8px 16px;border-radius:8px;background:var(--card);border:1px solid rgba(255,255,255,.1);color:var(--text);font-weight:600;cursor:pointer;font-size:.85rem}
        .view-btn.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
        .view-hint{font-size:.75rem;color:var(--muted);margin-left:8px;align-self:center}
        
        /* 分類標題 */
        .cat{margin-top:12px}
        .cat-head{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1);cursor:pointer}
        .cat-head h3{font-size:.9rem;color:var(--muted)}
        .cat-head .arr{transition:transform .2s}
        .cat-head.shut .arr{transform:rotate(-90deg)}
        .cat-cnt{margin-left:auto;font-size:.8rem;color:var(--accent)}
        .cat-body{padding-top:6px}
        .cat-body.hide{display:none}
        
        /* 裝飾項目 */
        .item{background:var(--card);border-radius:10px;padding:10px 14px;margin-bottom:6px;border:1px solid rgba(255,255,255,.08)}
        .item.done{border-color:var(--accent);background:rgba(74,222,128,.05)}
        .item-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
        .item-icon{font-size:1.3rem}
        .item-name{font-weight:600;font-size:.95rem}
        .item-sub{font-size:.75rem;color:var(--muted)}
        .item-prog{margin-left:auto;color:var(--accent);font-weight:600;font-size:.85rem}
        .item-btns{display:flex;gap:4px;margin-left:8px}
        .item-btns button{padding:4px 8px;font-size:.7rem;border-radius:4px;background:rgba(0,0,0,.3);color:var(--muted);border:none;cursor:pointer}
        .item-btns button:hover{color:var(--accent)}
        
        .piks{display:flex;gap:5px;flex-wrap:wrap}
        .pik{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2);border:2px solid transparent;cursor:pointer;position:relative}
        .pik:hover{transform:scale(1.08)}
        .pik.own{border-color:var(--accent);box-shadow:0 0 8px rgba(74,222,128,.3)}
        .pik.own::after{content:'✓';position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:var(--accent);border-radius:50%;font-size:.55rem;color:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:bold}
        .pik.na{opacity:.15;cursor:default}
        .pik .d{width:18px;height:18px;border-radius:50%}
        
        /* 缺失視圖 */
        .miss-sec{margin-bottom:16px}
        .miss-head{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:8px}
        .miss-head h4{font-size:.9rem}
        .miss-grid{display:flex;flex-wrap:wrap;gap:6px}
        .miss-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:16px;background:var(--card);font-size:.8rem;cursor:pointer;border:1px solid rgba(255,255,255,.08)}
        .miss-chip:hover{border-color:var(--accent)}
        .miss-chip.own{opacity:.3;text-decoration:line-through}
        .miss-none{color:var(--accent);font-size:.85rem}
        
        /* Modal */
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center}
        .modal.show{display:flex}
        .modal-box{background:var(--card);padding:24px;border-radius:16px;max-width:380px;width:90%}
        .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .modal-close{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer}
        .drop{border:2px dashed rgba(255,255,255,.15);border-radius:10px;padding:36px;text-align:center;cursor:pointer}
        .drop:hover{border-color:var(--accent)}
        .drop input{display:none}
        
        .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--accent);color:var(--bg);padding:10px 22px;border-radius:20px;font-weight:600;font-size:.9rem;transition:transform .3s;z-index:1001}
        .toast.show{transform:translateX(-50%) translateY(0)}
        
        .empty{text-align:center;padding:32px;color:var(--muted)}
        
        @media(max-width:600px){
            .item-top{flex-wrap:wrap}
            .item-btns{margin-left:0;margin-top:6px;width:100%}
            .stats{gap:8px}
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="header-row">
            <div class="logo">🌱 Pikmin 普查</div>
            <div class="stats">
                <div class="stat"><b id="sOwn">0</b><small>已收集</small></div>
                <div class="stat"><b id="sMiss">0</b><small>缺少</small></div>
                <div class="stat"><b id="sPct">0%</b><small>完成度</small></div>
            </div>
        </div>
    </div>
    
    <div class="toolbar">
        <input class="search" placeholder="🔍 搜尋裝飾..." id="search">
        <button class="btn" id="btnImport">📥 匯入</button>
        <button class="btn" id="btnExport">📤 匯出</button>
        <button class="btn" id="btnReset">🔄 重置</button>
    </div>
    
    <div class="views">
        <button class="view-btn on" data-v="list">📝 完整列表</button>
        <button class="view-btn" data-v="miss">📋 缺失清單</button>
        <span class="view-hint">按地點分類 | 點擊顏色可篩選</span>
    </div>
    
    <div class="filters" id="filters"></div>
    
    <div id="listView"></div>
    <div id="missView" style="display:none"></div>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <div class="modal-head"><h3>📥 匯入資料</h3><button class="modal-close" id="modalClose">×</button></div>
        <div class="drop" id="drop"><p style="font-size:1.8rem">📁</p><p>點擊或拖曳 JSON 檔案</p><input type="file" id="fileIn" accept=".json"></div>
    </div>
</div>
<div class="toast" id="toast"></div>

  {id:'paint',n:'油漆',en:'Paint',i:'🎨',c:C7},
  {id:'rosette_red',n:'紅色緞帶勳章',en:'Red Rosette',i:'🎖️',c:C7},
  {id:'rosette_yellow',n:'黃色緞帶勳章',en:'Yellow Rosette',i:'🎖️',c:C7},
  {id:'anniv3_cupcake',n:'三週年杯子蛋糕',en:'3rd Anniv Cupcake',i:'🧁',c:C7},
  {id:'ball_ornament',n:'球形吊飾',en:'Ball Ornament',i:'🔴',c:C7},

  {id:'rio',n:'里約嘉年華',en:'Rio Carnival',i:'🎭',c:C7},
  {id:'afternoon_tea',n:'下午茶',en:'Afternoon Tea',i:'🫖',c:C8},
  {id:'nintendo',n:'任天堂主機',en:'Nintendo Consoles',i:'🎮',c:C7},
  {id:'instrument',n:'小樂器',en:'Tiny Instrument',i:'🎵',c:C7},
  {id:'surfboard',n:'衝浪板鑰匙圈',en:'Surfboard',i:'🏄',c:C7},
  {id:'shaved_ice',n:'刨冰',en:'Shaved Ice',i:'🍧',c:C8},
  {id:'mooncake',n:'月餅',en:'Mooncake',i:'🥮',c:C7},
  {id:'photo_badge',n:'照片徽章',en:'Photo Badge',i:'📷',c:C7},
  {id:'calavera',n:'骷髏頭',en:'Calavera',i:'💀',c:C7},
  {id:'anniv4_flower',n:'四週年花盒',en:'4th Anniv Flower',i:'💐',c:C8},
  {id:'anniv4_snack',n:'四週年零食',en:'4th Anniv Snack',i:'🎂',c:C8},
  {id:'ornament_2025',n:'2025吊飾',en:'2025 Ornament',i:'🎄',c:C8},
  {id:'pacifier',n:'奶嘴',en:'Pacifier',i:'🍼',c:C8},
  {id:'osechi',n:'御節料理',en:'Osechi',i:'🍱',c:C8},
  {id:'chocolate_2026',n:'2026巧克力',en:'2026 Chocolate',i:'🍫',c:C8},
  {id:'color_powder',n:'彩色粉末',en:'Color Powder',i:'🎨',c:C7},
  {id:'golden_plane',n:'金色玩具飛機',en:'Golden Airplane',i:'✈️',c:C7},
]
};

let own = {};
let view = 'list';
let colorF = 'all';
let statusF = 'all';
let searchQ = '';
let shut = {};

const key = (d,c) => d+'_'+c;
const load = () => { const s=localStorage.getItem('pik_v5'); own=s?JSON.parse(s):{}; };
const save = () => localStorage.setItem('pik_v5',JSON.stringify(own));

function toggle(did,col){
    const k=key(did,col);
    own[k]=!own[k];
    if(!own[k]) delete own[k];
    save(); render();
}
function fillD(did,cols){ cols.forEach(c=>own[key(did,c)]=true); save(); render(); toast('✅ 已全選'); }
function clearD(did,cols){ cols.forEach(c=>delete own[key(did,c)]); save(); render(); toast('🗑️ 已清空'); }

function allDecors(){
    const arr=[];
    for(const [cat,items] of Object.entries(DATA)) items.forEach(d=>arr.push({...d,cat}));
    return arr;
}

function stats(){
    let o=0,m=0;
    allDecors().forEach(d=>d.c.forEach(c=>{if(own[key(d.id,c)])o++;else m++;}));
    return {o,m,t:o+m,p:o+m>0?(o/(o+m)*100).toFixed(1):0};
}
function colorStats(){
    const cs={};C.forEach(c=>cs[c]={o:0,m:0});
    allDecors().forEach(d=>d.c.forEach(c=>{if(own[key(d.id,c)])cs[c].o++;else cs[c].m++;}));
    return cs;
}

function renderFilters(){
    const cs=colorStats();
    let h=`<div class="chip ${colorF==='all'?'on':''}" onclick="setColorF('all')">全部</div>`;
    C.forEach(c=>h+=`<div class="chip ${colorF===c?'on':''}" onclick="setColorF('${c}')"><div class="dot ${c}"></div>${cs[c].m}缺</div>`);
    h+=`<div class="spacer"></div>`;
    h+=`<div class="chip ${statusF==='all'?'on':''}" onclick="setStatusF('all')">全部</div>`;
    h+=`<div class="chip ${statusF==='miss'?'on':''}" onclick="setStatusF('miss')">未完成</div>`;
    h+=`<div class="chip ${statusF==='done'?'on':''}" onclick="setStatusF('done')">已完成</div>`;
    document.getElementById('filters').innerHTML=h;
}
function setColorF(c){ colorF=c; render(); }
function setStatusF(s){ statusF=s; render(); }

function filterD(d){
    if(searchQ && !d.n.includes(searchQ) && !d.en.toLowerCase().includes(searchQ.toLowerCase())) return false;
    if(colorF!=='all' && !d.c.includes(colorF)) return false;
    const cnt=d.c.filter(c=>own[key(d.id,c)]).length;
    if(statusF==='done' && cnt!==d.c.length) return false;
    if(statusF==='miss' && cnt===d.c.length) return false;
    return true;
}

function renderList(){
    let h='';
    for(const [cat,items] of Object.entries(DATA)){
        const filtered=items.filter(filterD);
        if(!filtered.length) continue;
        const cO=filtered.reduce((s,d)=>s+d.c.filter(c=>own[key(d.id,c)]).length,0);
        const cT=filtered.reduce((s,d)=>s+d.c.length,0);
        const closed=shut[cat];
        h+=`<div class="cat"><div class="cat-head ${closed?'shut':''}" onclick="toggleCat('${cat}')"><span class="arr">▼</span><h3>${cat}</h3><span class="cat-cnt">${cO}/${cT}</span></div><div class="cat-body ${closed?'hide':''}">`;
        filtered.forEach(d=>{
            const cnt=d.c.filter(c=>own[key(d.id,c)]).length;
            const done=cnt===d.c.length;
            const cols=JSON.stringify(d.c).replace(/"/g,"'");
            h+=`<div class="item ${done?'done':''}"><div class="item-top"><span class="item-icon">${d.i}</span><div><span class="item-name">${d.n}</span>${d.note?`<span class="item-sub"> ${d.note}</span>`:''}</div><span class="item-prog">${cnt}/${d.c.length}</span><div class="item-btns"><button onclick="event.stopPropagation();fillD('${d.id}',${cols})">全選</button><button onclick="event.stopPropagation();clearD('${d.id}',${cols})">清空</button></div></div><div class="piks">${C.map(c=>{const av=d.c.includes(c);const has=av&&own[key(d.id,c)];return`<div class="pik ${has?'own':''} ${!av?'na':''}" ${av?`onclick="toggle('${d.id}','${c}')"`:''}title="${CN[c]}"><div class="d dot ${c}"></div></div>`;}).join('')}</div></div>`;
        });
        h+=`</div></div>`;
    }
    if(!h) h='<div class="empty">沒有匹配項</div>';
    document.getElementById('listView').innerHTML=h;
}

function renderMiss(){
    let h='';
    C.forEach(c=>{
        if(colorF!=='all' && colorF!==c) return;
        const miss=allDecors().filter(d=>d.c.includes(c)&&!own[key(d.id,c)]&&(!searchQ||d.n.includes(searchQ)));
        if(statusF==='done') return;
        h+=`<div class="miss-sec"><div class="miss-head"><div class="dot ${c}"></div><h4>${CN[c]} Pikmin</h4><span style="color:var(--muted);font-size:.8rem;margin-left:8px">缺 ${miss.length} 個</span></div><div class="miss-grid">${miss.length?miss.map(d=>`<div class="miss-chip" onclick="toggle('${d.id}','${c}')">${d.i} ${d.n}</div>`).join(''):'<span class="miss-none">✨ 全部收集完成！</span>'}</div></div>`;
    });
    if(!h) h='<div class="empty">沒有匹配項</div>';
    document.getElementById('missView').innerHTML=h;
}

function toggleCat(cat){ shut[cat]=!shut[cat]; render(); }

function render(){
    const st=stats();
    document.getElementById('sOwn').textContent=st.o;
    document.getElementById('sMiss').textContent=st.m;
    document.getElementById('sPct').textContent=st.p+'%';
    renderFilters();
    renderList();
    renderMiss();
}

function setView(v){
    view=v;
    document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
    document.getElementById('listView').style.display=v==='list'?'':'none';
    document.getElementById('missView').style.display=v==='miss'?'':'none';
}

function exportData(){
    const d={v:5,date:new Date().toISOString(),data:own};
    const b=new Blob([JSON.stringify(d)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);
    a.download='pikmin_'+new Date().toISOString().slice(0,10)+'.json';a.click();
    toast('📤 已匯出');
}

function importFile(f){
    const r=new FileReader();
    r.onload=e=>{try{
        const j=JSON.parse(e.target.result);
        own=j.data||j.collection||j;save();render();
        document.getElementById('modal').classList.remove('show');
        toast('📥 匯入成功');
    }catch(e){toast('❌ 格式錯誤');}};
    r.readAsText(f);
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// 事件
document.getElementById('search').oninput=e=>{searchQ=e.target.value;render();};
document.getElementById('btnExport').onclick=exportData;
document.getElementById('btnImport').onclick=()=>document.getElementById('modal').classList.add('show');
document.getElementById('modalClose').onclick=()=>document.getElementById('modal').classList.remove('show');
document.getElementById('btnReset').onclick=()=>{if(confirm('確定重置所有資料？')){own={};save();render();toast('🔄 已重置');}};
document.querySelectorAll('.view-btn').forEach(b=>b.onclick=()=>setView(b.dataset.v));
const drop=document.getElementById('drop'),fi=document.getElementById('fileIn');
drop.onclick=()=>fi.click();
fi.onchange=e=>e.target.files[0]&&importFile(e.target.files[0]);
drop.ondragover=e=>{e.preventDefault();drop.style.borderColor='var(--accent)';};
drop.ondragleave=()=>drop.style.borderColor='';
drop.ondrop=e=>{e.preventDefault();drop.style.borderColor='';e.dataTransfer.files[0]&&importFile(e.dataTransfer.files[0]);};
document.onkeydown=e=>{if(e.key==='Escape')document.getElementById('modal').classList.remove('show');};

load();render();
</script>
</body>
</html>
